services:
  postgres:
    image: postgres:15-alpine
    container_name: skillsync_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: skillsync
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - skillsync_network

  backend:
    build: ./backend
    container_name: skillsync_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/skillsync?schema=public
      JWT_SECRET: supersecretkey
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    networks:
      - skillsync_network

  frontend:
    build: ./frontend
    container_name: skillsync_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3000
    ports:
      - "3001:3000"
    depends_on:
      - backend
    networks:
      - skillsync_network

volumes:
  postgres_data:

networks:
  skillsync_network:
    driver: bridge